<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mbidi Rencontre</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding-bottom: 70px; }
        .page { display: none; }
        .page.active { display: block; }
        .header { padding: 20px; font-weight: bold; font-size: 24px; background: white; }
        .card { background: white; border-radius: 20px; padding: 15px; margin: 10px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #ccc; margin-right: 15px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        .nav-item { cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- PAGE ACCUEIL -->
    <div id="home" class="page active">
        <div class="header">Recommander</div>
        <div class="card"><div class="avatar"></div><strong>Rose Mella</strong></div>
        <div class="card"><div class="avatar"></div><strong>Jennie</strong></div>
    </div>

    <!-- PAGE CHAT -->
    <div id="chat" class="page">
        <div class="header">Messages</div>
        <div class="card"><div class="avatar"></div><strong>Theodora</strong><br>Oui</div>
        <div class="card"><div class="avatar"></div><strong>Brigitte</strong><br>cc</div>
    </div>

    <!-- BARRE DE NAVIGATION -->
    <div class="nav-bar">
        <div class="nav-item" onclick="showPage('home')">Accueil</div>
        <div class="nav-item" onclick="showPage('chat')">Chat</div>
        <div class="nav-item">Moi</div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
