<!DOCTYPE html>
<html>
<head>
    <title>Mbidi Rencontre</title>
    <!-- Chargement de la bibliothèque PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <h1>Mbidi Rencontre</h1>
    <video id="localVideo" autoplay muted playsinline style="width: 300px; border: 1px solid black;"></video>
    <video id="remoteVideo" autoplay playsinline style="width: 300px; border: 1px solid black;"></video>

    <script>
        const peer = new Peer(); // Crée un identifiant unique pour vous
        
        peer.on('open', (id) => {
            console.log('Mon ID est : ' + id);
            alert('Donnez cet ID à votre ami pour qu\'il vous appelle : ' + id);
        });

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                document.getElementById('localVideo').srcObject = stream;
                
                // Écouter les appels entrants
                peer.on('call', (call) => {
                    call.answer(stream);
                    call.on('stream', (remoteStream) => {
                        document.getElementById('remoteVideo').srcObject = remoteStream;
                    });
                });
            });
    </script>
</body>
</html>
