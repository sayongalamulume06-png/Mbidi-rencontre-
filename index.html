<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mbidi Rencontre</title>
    <style>
        /* Styles existants */
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding-bottom: 70px; }
        .page { display: none; }
        .page.active { display: block; }
        .header { padding: 20px; font-weight: bold; font-size: 24px; background: white; }
        
        /* AJOUTEZ CES LIGNES ICI POUR LE STYLE CHAT */
        .chat-container { display: flex; flex-direction: column; padding: 15px; }
        .bubble { max-width: 75%; padding: 10px 15px; margin: 5px; border-radius: 15px; font-size: 14px; }
        .bubble.received { background: #e4e6eb; align-self: flex-start; }
        .bubble.sent { background: #0084ff; color: white; align-self: flex-end; }
        
        /* Styles navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        .nav-item { cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- PAGE CHAT -->
    <div id="chat" class="page">
        <div class="header">Discussion</div>
        <div class="chat-container">
            <div class="bubble received">Salut ! Comment ça va ?</div>
            <div class="bubble sent">Ça va très bien et toi ?</div>
            <div class="bubble received">Super ! Tu fais quoi ?</div>
        </div>
    </div>

    <!-- ... le reste de votre code (Accueil, Navigation, Script) ... -->

</body>
</html>
