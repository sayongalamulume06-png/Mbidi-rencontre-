<!DOCTYPE html>
<html>
<head>
    <title>Mbidi Rencontre</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        #video-container { display: none; }
    </style>
</head>
<body>
    <div id="login-screen">
        <h1>Bienvenue sur Mbidi Rencontre</h1>
        <input type="text" id="username" placeholder="Entrez votre nom">
        <button onclick="startApp()">Entrer</button>
    </div>

    <div id="video-container">
        <h1>Bonjour <span id="displayName"></span></h1>
        <div id="myId">Chargement...</div>
        <video id="localVideo" autoplay muted playsinline style="width: 200px; border: 1px solid black;"></video>
        <video id="remoteVideo" autoplay playsinline controls style="width: 200px; border: 1px solid black;"></video>
        
        <hr>
        <h3>Envoi de fichiers / Voice</h3>
        <!-- Section Fichier -->
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="sendPhoto()">Envoyer Photo</button>
        <br><br>
        <!-- Section Voix -->
        <button id="recordBtn" onclick="startRecording()">Enregistrer Voix</button>
        <button id="stopBtn" onclick="stopRecording()" disabled>Arrêter et Envoyer</button>
        
        <div id="messageArea"></div>
    </div>

    <script>
        let peer, myStream, conn, mediaRecorder, audioChunks = [];

        function startApp() {
            const name = document.getElementById('username').value;
            if (name === "") return alert("Veuillez entrer un nom");
            document.getElementById('displayName').innerText = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            initPeer();
        }

        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => { document.getElementById('myId').innerText = 'Votre ID : ' + id; });

            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    myStream = stream;
                    document.getElementById('localVideo').srcObject = stream;
                    
                    // Préparation de l'enregistrement audio
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (event) => { audioChunks.push(event.data); };
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const reader = new FileReader();
                        reader.onload = (e) => { conn.send(e.target.result); };
                        reader.readAsDataURL(audioBlob);
                        audioChunks = [];
                    };
                });

            peer.on('call', (call) => {
                call.answer(myStream);
                call.on('stream', (remoteStream) => { document.getElementById('remoteVideo').srcObject = remoteStream; });
            });

            peer.on('connection', (c) => { 
                conn = c; 
                setupConnection(); 
            });
        }

        function callFriend() {
            const id = document.getElementById('peerId').value;
            peer.call(id, myStream).on('stream', (remoteStream) => { document.getElementById('remoteVideo').srcObject = remoteStream; });
            conn = peer.connect(id);
            setupConnection();
        }

        function setupConnection() {
            conn.on('data', (data) => {
                if (data.startsWith('data:image')) {
                    const img = document.createElement('img');
                    img.src = data;
                    img.style.width = '200px';
                    document.getElementById('messageArea').prepend(img);
                } else if (data.startsWith('data:audio')) {
                    const audio = document.createElement('audio');
                    audio.src = data;
                    audio.controls = true;
                    document.getElementById('messageArea').prepend(audio);
                }
            });
        }

        function startRecording() {
            audioChunks = [];
            mediaRecorder.start();
            document.getElementById('recordBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('recordBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }

        function sendPhoto() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => { conn.send(e.target.result); };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
